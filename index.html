<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <title>技能书</title>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    :root{--bg:#f4f3f0;--surface:#fff;--text:#1a1916;--muted:#77736c;--border:#d8d5cf;--strong:#aaa59c;--danger:#a73737;--shadow:0 16px 60px rgba(27,25,22,.12);--soft:#faf9f7}
    html,body{margin:0;min-height:100%;font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
    button,input,select,textarea{font:inherit}button{cursor:pointer}[hidden]{display:none!important}
    .auth-screen{min-height:100vh;display:grid;place-items:center;padding:24px;background:linear-gradient(180deg,#eeece7 0,#f7f6f3 100%)}
    .auth-card{width:min(430px,100%);background:var(--surface);border:1px solid var(--border);padding:38px 34px;box-shadow:var(--shadow)}
    .auth-kicker{font-size:11px;letter-spacing:.22em;color:var(--muted);margin-bottom:14px}.auth-card h1{font-family:Georgia,"Noto Serif SC",serif;font-size:34px;margin:0 0 34px;letter-spacing:.08em}
    .question{font-size:17px;font-weight:600;line-height:1.6;margin-bottom:13px}.answer-input{width:100%;height:46px;border:1px solid var(--strong);background:var(--soft);padding:0 13px;outline:none}.answer-input:focus{border-color:var(--text);box-shadow:0 0 0 2px rgba(26,25,22,.08)}
    .auth-btn{width:100%;height:46px;border:0;background:var(--text);color:#fff;margin-top:14px;font-weight:600;letter-spacing:.08em}.auth-btn:disabled{opacity:.55;cursor:wait}.auth-error{min-height:22px;margin-top:12px;color:var(--danger);font-size:13px;line-height:1.6}.privacy-note{margin-top:22px;padding-top:18px;border-top:1px solid var(--border);font-size:12px;line-height:1.7;color:var(--muted)}
    .topbar{height:58px;background:var(--text);color:#f6f5f2;padding:0 max(20px,calc((100vw - 1080px)/2));display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}.brand{display:flex;align-items:baseline;gap:12px;min-width:0}.brand-title{font-family:Georgia,"Noto Serif SC",serif;font-size:21px;font-weight:700;letter-spacing:.12em;white-space:nowrap}.count{font-size:11px;color:#aaa8a3;white-space:nowrap}.header-actions{display:flex;align-items:center;gap:8px}.cloud-state{font-size:11px;color:#aaa8a3;margin-right:4px;white-space:nowrap}.header-btn{height:32px;border:1px solid #55534f;background:transparent;color:#eee;padding:0 12px;font-size:12px;border-radius:2px}.header-btn:hover{border-color:#eee}.header-btn.primary{background:#f4f3f0;color:#1a1916;border-color:#f4f3f0;font-weight:600}
    .container{width:min(1080px,100%);margin:0 auto;padding:28px 20px 64px}.migration{display:flex;align-items:center;justify-content:space-between;gap:16px;background:#fff;border:1px solid var(--border);padding:14px 16px;margin-bottom:18px;font-size:13px;line-height:1.6}.migration strong{display:block;margin-bottom:2px}.migration button{border:0;background:var(--text);color:#fff;padding:9px 14px;white-space:nowrap}
    .controls{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:18px}.search{position:relative;width:min(320px,100%)}.search input{width:100%;height:40px;border:1px solid var(--border);background:#fff;padding:0 14px 0 38px;outline:none}.search input:focus{border-color:var(--text)}.search svg{position:absolute;left:13px;top:12px;width:16px;height:16px;stroke:var(--muted)}.tabs{display:flex;flex-wrap:wrap;gap:5px;flex:1}.tab{border:1px solid transparent;background:transparent;color:var(--muted);padding:8px 10px;font-size:12px}.tab:hover{color:var(--text)}.tab.active{border-color:var(--strong);background:#fff;color:var(--text);font-weight:600}.tab.manage{margin-left:auto;border-color:var(--border)}
    .table-shell{background:#fff;border-top:2px solid var(--text);border-bottom:1px solid var(--border);overflow-x:auto}table{width:100%;border-collapse:collapse;min-width:650px}th{text-align:left;padding:11px 14px;border-bottom:1px solid var(--border);font-size:10px;letter-spacing:.14em;color:var(--muted);font-weight:600}td{padding:15px 14px;border-bottom:1px solid #e7e4de;vertical-align:top}tbody tr{cursor:pointer;transition:background .12s}tbody tr:hover{background:var(--soft)}tbody tr:last-child td{border-bottom:0}.num{width:56px;color:#99958e;font-size:11px;padding-top:18px}.cat{width:112px}.badge{display:inline-block;border:1px solid var(--strong);padding:3px 8px;font-size:11px;letter-spacing:.04em;color:#4f4c47;white-space:nowrap}.skill-title{font-size:15px;font-weight:600;line-height:1.5}.preview{font-size:12px;color:var(--muted);line-height:1.55;margin-top:3px;max-width:680px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.media-flags{display:flex;gap:8px;margin-top:6px;font-size:11px;color:#77736c}.media-flag{white-space:nowrap}.date{width:124px;text-align:right;color:#8d8982;font-size:11px;white-space:nowrap;padding-top:18px}.empty{text-align:center;background:#fff;padding:74px 20px;color:#99958e;font-size:13px;border-bottom:1px solid var(--border)}
    .overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.48);padding:20px;z-index:100}.overlay.open{display:flex}.modal{width:min(650px,100%);max-height:92vh;overflow:auto;background:#fff;box-shadow:var(--shadow)}.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:2}.modal-head h2{font-size:17px;margin:0}.close{width:34px;height:34px;border:0;background:transparent;font-size:24px;color:var(--muted)}.modal-body{padding:22px}.field{margin-bottom:18px}.field:last-child{margin-bottom:0}label{display:block;font-size:12px;font-weight:600;margin-bottom:7px}.field input,.field select,.field textarea{width:100%;border:1px solid var(--border);background:var(--soft);padding:10px 11px;outline:none}.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--text)}.field textarea{min-height:160px;resize:vertical;line-height:1.7}.modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:15px 22px;border-top:1px solid var(--border);background:var(--soft);position:sticky;bottom:0;z-index:2}.btn{border:1px solid var(--border);background:#fff;color:var(--text);padding:9px 15px}.btn.primary{background:var(--text);color:#fff;border-color:var(--text)}.btn.danger{color:var(--danger);border-color:#d9b2b2;margin-right:auto}.btn:disabled{opacity:.55;cursor:wait}
    .media-box{border:1px solid var(--border);background:var(--soft);padding:13px}.media-title-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:9px}.media-title-row strong{font-size:12px}.media-hint{font-size:11px;color:var(--muted);line-height:1.55}.media-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.media-btn{border:1px solid var(--strong);background:#fff;color:var(--text);padding:8px 11px;font-size:12px}.media-btn.recording{background:#8f2d2d;color:#fff;border-color:#8f2d2d}.media-btn.danger{color:var(--danger);border-color:#d9b2b2}.image-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:12px}.image-card{position:relative;aspect-ratio:4/3;background:#e9e7e2;border:1px solid var(--border);overflow:hidden}.image-card img{width:100%;height:100%;object-fit:cover;display:block}.image-remove{position:absolute;top:5px;right:5px;width:28px;height:28px;border:0;border-radius:50%;background:rgba(20,20,20,.78);color:#fff;font-size:17px;line-height:1}.image-name{position:absolute;left:0;right:0;bottom:0;padding:18px 6px 5px;background:linear-gradient(transparent,rgba(0,0,0,.7));color:#fff;font-size:9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.audio-wrap{margin-top:11px}.audio-wrap audio{width:100%;height:42px}.record-status{font-size:12px;color:var(--muted);margin-top:9px}.record-status.live{color:#8f2d2d;font-weight:600}.upload-progress{font-size:12px;color:var(--muted);margin-top:8px}
    .detail-category{font-size:11px;color:var(--muted);letter-spacing:.14em;margin-bottom:14px}.detail-title{font-family:Georgia,"Noto Serif SC",serif;font-size:25px;line-height:1.45;font-weight:700;margin-bottom:20px}.detail-body{white-space:pre-wrap;font-size:14px;line-height:1.9;color:#393631;min-height:50px}.detail-media{margin-top:22px}.detail-section-title{font-size:11px;letter-spacing:.13em;color:var(--muted);margin:0 0 9px}.detail-gallery{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.detail-gallery a{display:block;background:#eceae5;border:1px solid var(--border);overflow:hidden}.detail-gallery img{display:block;width:100%;aspect-ratio:4/3;object-fit:cover}.detail-audio audio{width:100%}.detail-date{font-size:11px;color:var(--muted);margin-top:24px;padding-top:14px;border-top:1px solid var(--border)}
    .category-row{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e6e3dd;padding:11px 2px;font-size:13px}.category-row button{border:0;background:transparent;color:var(--danger);font-size:18px}.category-add{display:flex;gap:8px;margin-top:16px}.category-add input{flex:1;border:1px solid var(--border);padding:9px 11px;outline:none}.category-add button{border:0;background:var(--text);color:#fff;padding:0 16px}
    .toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,70px);background:var(--text);color:#fff;padding:10px 17px;font-size:12px;opacity:0;transition:.2s;z-index:300;pointer-events:none}.toast.show{transform:translate(-50%,0);opacity:1}.spinner{display:inline-block;width:12px;height:12px;border:2px solid #aaa;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;vertical-align:-2px}@keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:760px){.topbar{padding:0 10px}.brand-title{font-size:18px}.count,.cloud-state,.header-btn.backup{display:none}.header-btn{padding:0 8px}.container{padding:18px 12px 48px}.controls{flex-direction:column}.search{width:100%}.tabs{width:100%}.tab.manage{margin-left:0}.migration{align-items:flex-start;flex-direction:column}.migration button{width:100%}.auth-card{padding:32px 24px}.preview{display:none}.image-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.detail-gallery{grid-template-columns:1fr}.modal{max-height:94vh}.modal-body{padding:17px}.modal-head{padding:15px 17px}.modal-foot{padding:12px 17px}}
  </style>
</head>
<body>
  <section id="authScreen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-kicker">PRIVATE SKILL BOOK</div><h1>技能书</h1>
      <form id="loginForm"><div class="question">你要进这个网站干什么？</div><input id="answerInput" class="answer-input" type="password" autocomplete="current-password" placeholder="输入你的答案" required><button id="loginBtn" class="auth-btn" type="submit">进入技能书</button><div id="authError" class="auth-error" role="alert"></div></form>
      <div class="privacy-note">文字、图片和录音都保存到你的私人云端空间。只有通过验证后才能读取。</div>
    </div>
  </section>

  <main id="app" hidden>
    <header class="topbar">
      <div class="brand"><span class="brand-title">技能书</span><span id="count" class="count">0 条技能</span></div>
      <div class="header-actions"><span id="cloudState" class="cloud-state">云端已连接</span><button class="header-btn backup" onclick="exportBackup()">备份</button><button class="header-btn" onclick="logout()">退出</button><button class="header-btn primary" onclick="openAdd()">＋ 新增技能</button></div>
    </header>
    <div class="container">
      <section id="migrationBanner" class="migration" hidden><div><strong>检测到这台设备中的旧版技能数据</strong><span id="migrationText"></span></div><button id="migrationBtn" onclick="migrateLocalData()">迁移到云端</button></section>
      <div class="controls"><div class="search"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg><input id="searchInput" placeholder="搜索技能…" oninput="render()"></div><div id="tabs" class="tabs"></div></div>
      <div id="tableShell" class="table-shell"><table><thead><tr><th>#</th><th>分类</th><th>技能</th><th style="text-align:right">收录日期</th></tr></thead><tbody id="tableBody"></tbody></table></div><div id="empty" class="empty" hidden>— 暂无记录 —</div>
    </div>
  </main>

  <div id="addOverlay" class="overlay"><div class="modal">
    <div class="modal-head"><h2>新增技能</h2><button class="close" onclick="closeAdd()">×</button></div>
    <div class="modal-body">
      <div class="field"><label>技能名称 *</label><input id="addTitle" placeholder="简洁明了地描述这项技能"></div>
      <div class="field"><label>分类</label><select id="addCategory"></select></div>
      <div class="field"><label>详细说明</label><textarea id="addDescription" placeholder="步骤、要点、注意事项……"></textarea></div>
      <div class="field"><label>图片</label><div class="media-box"><div class="media-title-row"><strong>图片附件</strong><span id="addImageCount" class="media-hint">0 / 6</span></div><div class="media-hint">最多 6 张，每张不超过 10MB。图片会保存到私人云端。</div><input id="addImagesInput" type="file" accept="image/jpeg,image/png,image/webp,image/gif" multiple hidden onchange="handleImageFiles('add',this.files)"><div class="media-actions"><button class="media-btn" type="button" onclick="$('addImagesInput').click()">＋ 选择图片</button></div><div id="addImageGrid" class="image-grid"></div></div></div>
      <div class="field"><label>语音留言</label><div class="media-box"><div class="media-hint">点击开始后允许浏览器使用麦克风，最长录制 10 分钟。每条技能可保存 1 段录音。</div><div class="media-actions"><button id="addRecordBtn" class="media-btn" type="button" onclick="toggleRecording('add')">● 开始录音</button><button id="addRemoveAudioBtn" class="media-btn danger" type="button" onclick="removeAudio('add')" hidden>删除录音</button></div><div id="addRecordStatus" class="record-status">尚未录音</div><div id="addAudioWrap" class="audio-wrap" hidden><audio id="addAudioPreview" controls preload="metadata"></audio></div></div></div>
      <div id="addUploadProgress" class="upload-progress"></div>
    </div>
    <div class="modal-foot"><button class="btn" onclick="closeAdd()">取消</button><button id="addSaveBtn" class="btn primary" onclick="saveAdd()">保存</button></div>
  </div></div>

  <div id="detailOverlay" class="overlay"><div class="modal">
    <div class="modal-head"><h2>技能详情</h2><button class="close" onclick="closeDetail()">×</button></div>
    <div id="detailView" class="modal-body"><div id="detailCategory" class="detail-category"></div><div id="detailTitle" class="detail-title"></div><div id="detailDescription" class="detail-body"></div><div id="detailMedia" class="detail-media"></div><div id="detailDate" class="detail-date"></div></div>
    <div id="editView" class="modal-body" hidden>
      <div class="field"><label>技能名称 *</label><input id="editTitle"></div><div class="field"><label>分类</label><select id="editCategory"></select></div><div class="field"><label>详细说明</label><textarea id="editDescription"></textarea></div>
      <div class="field"><label>图片</label><div class="media-box"><div class="media-title-row"><strong>图片附件</strong><span id="editImageCount" class="media-hint">0 / 6</span></div><div class="media-hint">可删除原图或继续添加，最多保留 6 张。</div><input id="editImagesInput" type="file" accept="image/jpeg,image/png,image/webp,image/gif" multiple hidden onchange="handleImageFiles('edit',this.files)"><div class="media-actions"><button class="media-btn" type="button" onclick="$('editImagesInput').click()">＋ 添加图片</button></div><div id="editImageGrid" class="image-grid"></div></div></div>
      <div class="field"><label>语音留言</label><div class="media-box"><div class="media-hint">新录音会替换原有录音。</div><div class="media-actions"><button id="editRecordBtn" class="media-btn" type="button" onclick="toggleRecording('edit')">● 开始录音</button><button id="editRemoveAudioBtn" class="media-btn danger" type="button" onclick="removeAudio('edit')" hidden>删除录音</button></div><div id="editRecordStatus" class="record-status">尚未录音</div><div id="editAudioWrap" class="audio-wrap" hidden><audio id="editAudioPreview" controls preload="metadata"></audio></div></div></div>
      <div id="editUploadProgress" class="upload-progress"></div>
    </div>
    <div id="detailFoot" class="modal-foot"><button class="btn danger" onclick="deleteSkill()">删除</button><button class="btn" onclick="openEdit()">编辑</button><button class="btn" onclick="closeDetail()">关闭</button></div>
    <div id="editFoot" class="modal-foot" hidden><button class="btn" onclick="cancelEdit()">返回</button><button id="editSaveBtn" class="btn primary" onclick="saveEdit()">保存修改</button></div>
  </div></div>

  <div id="categoryOverlay" class="overlay"><div class="modal"><div class="modal-head"><h2>管理分类</h2><button class="close" onclick="closeOverlay('categoryOverlay')">×</button></div><div class="modal-body"><div id="categoryList"></div><div class="category-add"><input id="newCategory" placeholder="新分类名称"><button onclick="addCategory()">添加</button></div></div><div class="modal-foot"><button class="btn primary" onclick="closeOverlay('categoryOverlay')">完成</button></div></div></div>
  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://wmbbzdelhlqwozunoifa.supabase.co';
    const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_s9iJyUj8QwdUWWxiPTtrFA_VsaN2s68';
    const OWNER_EMAIL = 'skillbook-owner@example.com';
    const DEFAULT_CATEGORIES = ['生活','厨房','收纳','健康','手工','数码','其他'];
    const MEDIA_BUCKET = 'skill-media';
    const MAX_IMAGES = 6;
    const MAX_IMAGE_BYTES = 10 * 1024 * 1024;
    const MAX_AUDIO_BYTES = 24 * 1024 * 1024;
    const MAX_RECORD_SECONDS = 600;
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:false}});

    let session=null,skills=[],categories=[],activeCategory='全部',currentId=null,toastTimer=null;
    let recorder=null,recorderStream=null,recorderChunks=[],recordingTarget=null,recordingStartedAt=0,recordingTimer=null,recordingSave=true,recordingStopResolve=null;
    const mediaState={
      add:{newImages:[],imageUrls:[],audioBlob:null,audioUrl:null,audioDuration:0},
      edit:{existingImages:[],removedImages:[],newImages:[],imageUrls:[],existingAudio:null,removeExistingAudio:false,audioBlob:null,audioUrl:null,audioDuration:0}
    };
    const signedCache=new Map();

    const $=id=>document.getElementById(id);const today=()=>new Date().toISOString().slice(0,10);const normalizeText=value=>String(value??'').trim();
    const escapeHtml=value=>String(value??'').replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));
    const formatDuration=seconds=>`${String(Math.floor((seconds||0)/60)).padStart(2,'0')}:${String(Math.floor((seconds||0)%60)).padStart(2,'0')}`;
    const baseMime=mime=>String(mime||'').split(';')[0].trim().toLowerCase();const fileExt=(name,mime)=>{const raw=(name||'').split('.').pop().toLowerCase().replace(/[^a-z0-9]/g,'');if(raw&&raw.length<=5&&raw!==(name||'').toLowerCase())return raw;return({'image/jpeg':'jpg','image/png':'png','image/webp':'webp','image/gif':'gif','audio/webm':'webm','audio/ogg':'ogg','audio/mp4':'m4a','audio/mpeg':'mp3','audio/wav':'wav','audio/x-wav':'wav','audio/x-m4a':'m4a'}[baseMime(mime)]||'bin');};

    function toast(message){const el=$('toast');el.textContent=message;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2200)}
    function setCloudState(text,loading=false){$('cloudState').innerHTML=loading?'<span class="spinner"></span>'+escapeHtml(text):escapeHtml(text)}
    function setButtonLoading(button,loading,text){button.disabled=loading;if(!button.dataset.original)button.dataset.original=button.textContent;button.textContent=loading?text:button.dataset.original}
    function openOverlay(id){$(id).classList.add('open')}function closeOverlay(id){$(id).classList.remove('open')}

    async function init(){const{data,error}=await db.auth.getSession();if(error)console.error(error);session=data?.session??null;if(session)await enterApp();else showLogin();db.auth.onAuthStateChange((_event,newSession)=>{session=newSession;if(!newSession)showLogin()})}
    function showLogin(){$('app').hidden=true;$('authScreen').hidden=false;$('answerInput').value='';$('authError').textContent='';setTimeout(()=>$('answerInput').focus(),50)}
    async function enterApp(){$('authScreen').hidden=true;$('app').hidden=false;setCloudState('正在同步',true);await loadCloudData();detectLocalData()}
    $('loginForm').addEventListener('submit',async event=>{event.preventDefault();const answer=$('answerInput').value,button=$('loginBtn');$('authError').textContent='';if(!answer){$('authError').textContent='请输入答案。';return}setButtonLoading(button,true,'正在验证…');const{data,error}=await db.auth.signInWithPassword({email:OWNER_EMAIL,password:answer});setButtonLoading(button,false,'正在验证…');if(error||!data.session){$('authError').textContent='答案不正确，请重新输入。';$('answerInput').select();return}session=data.session;await enterApp()});
    async function logout(){if(recorder)await stopRecording(false);await db.auth.signOut();session=null;showLogin()}

    async function loadCloudData(){try{const[skillsResult,categoriesResult]=await Promise.all([
      db.from('skills').select('id,title,category,description,recorded_on,created_at,updated_at,image_paths,audio_path,audio_duration').order('recorded_on',{ascending:false}).order('created_at',{ascending:false}),
      db.from('skill_categories').select('id,name,sort_order').order('sort_order',{ascending:true}).order('created_at',{ascending:true})]);
      if(skillsResult.error)throw skillsResult.error;if(categoriesResult.error)throw categoriesResult.error;skills=(skillsResult.data??[]).map(s=>({...s,image_paths:Array.isArray(s.image_paths)?s.image_paths:[]}));categories=(categoriesResult.data??[]).map(row=>row.name);if(!categories.length)await seedCategories();buildTabs();render();setCloudState('云端已同步')}catch(error){console.error(error);setCloudState('同步失败');toast(error?.message?.includes('image_paths')?'请先运行附件升级 SQL':'云端同步失败，请刷新重试')}}
    async function seedCategories(){const rows=DEFAULT_CATEGORIES.map((name,index)=>({name,sort_order:index}));const{error}=await db.from('skill_categories').insert(rows);if(error)throw error;categories=[...DEFAULT_CATEGORIES]}
    function buildTabs(){if(activeCategory!=='全部'&&!categories.includes(activeCategory))activeCategory='全部';const items=['全部',...categories];$('tabs').innerHTML=items.map(name=>`<button class="tab ${name===activeCategory?'active':''}" onclick="selectCategory('${escapeHtml(name).replace(/'/g,"\\'")}')">${escapeHtml(name)}</button>`).join('')+'<button class="tab manage" onclick="openCategories()">⚙ 分类</button>';fillCategorySelect('addCategory');fillCategorySelect('editCategory')}
    function selectCategory(name){activeCategory=name;buildTabs();render()}
    function fillCategorySelect(id,selected){const list=categories.length?categories:DEFAULT_CATEGORIES;$(id).innerHTML=list.map(name=>`<option value="${escapeHtml(name)}" ${name===selected?'selected':''}>${escapeHtml(name)}</option>`).join('')}
    function render(){const query=normalizeText($('searchInput').value).toLowerCase();const filtered=skills.filter(skill=>{const categoryMatch=activeCategory==='全部'||skill.category===activeCategory;const queryMatch=!query||normalizeText(skill.title).toLowerCase().includes(query)||normalizeText(skill.description).toLowerCase().includes(query);return categoryMatch&&queryMatch});$('count').textContent=`${skills.length} 条技能`;$('tableBody').innerHTML=filtered.map((skill,index)=>{const flags=[];if(skill.image_paths?.length)flags.push(`<span class="media-flag">▧ ${skill.image_paths.length} 张图</span>`);if(skill.audio_path)flags.push('<span class="media-flag">◉ 语音</span>');return `<tr onclick="openDetail(${Number(skill.id)})"><td class="num">${String(index+1).padStart(2,'0')}</td><td class="cat"><span class="badge">${escapeHtml(skill.category)}</span></td><td><div class="skill-title">${escapeHtml(skill.title)}</div>${skill.description?`<div class="preview">${escapeHtml(skill.description.replace(/\n/g,' '))}</div>`:''}${flags.length?`<div class="media-flags">${flags.join('')}</div>`:''}</td><td class="date">${escapeHtml(skill.recorded_on||'')}　›</td></tr>`}).join('');const isEmpty=filtered.length===0;$('tableShell').hidden=isEmpty;$('empty').hidden=!isEmpty}

    function revokeUrls(list){list.forEach(url=>URL.revokeObjectURL(url));list.length=0}
    function resetAddMedia(){revokeUrls(mediaState.add.imageUrls);if(mediaState.add.audioUrl)URL.revokeObjectURL(mediaState.add.audioUrl);mediaState.add={newImages:[],imageUrls:[],audioBlob:null,audioUrl:null,audioDuration:0};$('addImagesInput').value='';renderImageGrid('add');renderAudio('add')}
    function resetEditMedia(){revokeUrls(mediaState.edit.imageUrls);if(mediaState.edit.audioUrl)URL.revokeObjectURL(mediaState.edit.audioUrl);mediaState.edit={existingImages:[],removedImages:[],newImages:[],imageUrls:[],existingAudio:null,removeExistingAudio:false,audioBlob:null,audioUrl:null,audioDuration:0};$('editImagesInput').value='';renderImageGrid('edit');renderAudio('edit')}
    function openAdd(){resetAddMedia();$('addTitle').value='';$('addDescription').value='';$('addUploadProgress').textContent='';fillCategorySelect('addCategory',categories[0]||'其他');openOverlay('addOverlay');setTimeout(()=>$('addTitle').focus(),40)}
    async function closeAdd(){if(recordingTarget==='add')await stopRecording(false);resetAddMedia();closeOverlay('addOverlay')}

    function handleImageFiles(mode,fileList){const state=mediaState[mode];const files=Array.from(fileList||[]);const used=(mode==='edit'?state.existingImages.length:0)+state.newImages.length;let available=MAX_IMAGES-used;if(available<=0){toast('最多只能保留 6 张图片');$(mode+'ImagesInput').value='';return}for(const file of files){if(available<=0)break;if(!['image/jpeg','image/png','image/webp','image/gif'].includes(file.type)){toast(`不支持 ${file.name} 的格式`);continue}if(file.size>MAX_IMAGE_BYTES){toast(`${file.name} 超过 10MB`);continue}state.newImages.push(file);state.imageUrls.push(URL.createObjectURL(file));available--}$(mode+'ImagesInput').value='';renderImageGrid(mode)}
    function renderImageGrid(mode){const state=mediaState[mode],grid=$(mode+'ImageGrid'),count=(mode==='edit'?state.existingImages.length:0)+state.newImages.length;$(mode+'ImageCount').textContent=`${count} / ${MAX_IMAGES}`;grid.innerHTML='';if(mode==='edit')state.existingImages.forEach((path,index)=>{const card=document.createElement('div');card.className='image-card';card.innerHTML=`<div class="image-name">云端图片 ${index+1}</div><button class="image-remove" type="button" aria-label="删除图片">×</button>`;card.querySelector('button').onclick=()=>removeExistingImage(index);grid.appendChild(card);loadSignedUrl(path).then(url=>{if(url&&card.isConnected){const img=document.createElement('img');img.src=url;img.alt='技能图片';card.prepend(img)}})});state.newImages.forEach((file,index)=>{const card=document.createElement('div');card.className='image-card';card.innerHTML=`<img src="${state.imageUrls[index]}" alt="${escapeHtml(file.name)}"><div class="image-name">${escapeHtml(file.name)}</div><button class="image-remove" type="button" aria-label="删除图片">×</button>`;card.querySelector('button').onclick=()=>removeNewImage(mode,index);grid.appendChild(card)})}
    function removeNewImage(mode,index){const state=mediaState[mode];URL.revokeObjectURL(state.imageUrls[index]);state.newImages.splice(index,1);state.imageUrls.splice(index,1);renderImageGrid(mode)}
    function removeExistingImage(index){const state=mediaState.edit,path=state.existingImages[index];state.removedImages.push(path);state.existingImages.splice(index,1);renderImageGrid('edit')}

    function supportedAudioMime(){if(!window.MediaRecorder)return'';return['audio/webm;codecs=opus','audio/mp4','audio/webm','audio/ogg;codecs=opus'].find(type=>MediaRecorder.isTypeSupported(type))||''}
    async function toggleRecording(target){if(recorder){if(recordingTarget===target)await stopRecording(true);else{await stopRecording(true);await startRecording(target)}}else await startRecording(target)}
    async function startRecording(target){if(!navigator.mediaDevices?.getUserMedia||!window.MediaRecorder){toast('当前浏览器不支持直接录音');return}try{recorderStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}});const mime=supportedAudioMime();recorder=new MediaRecorder(recorderStream,mime?{mimeType:mime}:undefined);recorderChunks=[];recordingTarget=target;recordingStartedAt=Date.now();recordingSave=true;recorder.ondataavailable=e=>{if(e.data?.size)recorderChunks.push(e.data)};recorder.onstop=()=>finishRecording();recorder.start(500);updateRecordingUi();recordingTimer=setInterval(()=>{const seconds=Math.floor((Date.now()-recordingStartedAt)/1000);$(target+'RecordStatus').textContent=`正在录音 ${formatDuration(seconds)} / 10:00`;if(seconds>=MAX_RECORD_SECONDS)stopRecording(true)},500)}catch(error){console.error(error);cleanupRecorder();toast(error?.name==='NotAllowedError'?'需要允许浏览器使用麦克风':'无法启动录音，请重试')}}
    function stopRecording(save=true){if(!recorder)return Promise.resolve();recordingSave=save;return new Promise(resolve=>{recordingStopResolve=resolve;try{recorder.stop()}catch{finishRecording()}})}
    function finishRecording(){const target=recordingTarget;if(recordingTimer)clearInterval(recordingTimer);const seconds=Math.max(1,Math.min(MAX_RECORD_SECONDS,Math.round((Date.now()-recordingStartedAt)/1000)));if(recordingSave&&target&&recorderChunks.length){const type=recorder?.mimeType||recorderChunks[0]?.type||'audio/webm';const blob=new Blob(recorderChunks,{type});if(blob.size>MAX_AUDIO_BYTES)toast('录音文件过大，请缩短录音后重试');else{const state=mediaState[target];if(state.audioUrl)URL.revokeObjectURL(state.audioUrl);state.audioBlob=blob;state.audioUrl=URL.createObjectURL(blob);state.audioDuration=seconds;if(target==='edit'&&state.existingAudio)state.removeExistingAudio=true}}cleanupRecorder();if(target)renderAudio(target);if(recordingStopResolve){recordingStopResolve();recordingStopResolve=null}}
    function cleanupRecorder(){if(recordingTimer)clearInterval(recordingTimer);recordingTimer=null;if(recorderStream)recorderStream.getTracks().forEach(track=>track.stop());recorderStream=null;recorder=null;recorderChunks=[];recordingTarget=null;recordingStartedAt=0;updateRecordingUi()}
    function updateRecordingUi(){['add','edit'].forEach(mode=>{const button=$(mode+'RecordBtn'),status=$(mode+'RecordStatus');const live=!!recorder&&recordingTarget===mode;button.textContent=live?'■ 停止录音':'● 开始录音';button.classList.toggle('recording',live);status.classList.toggle('live',live)})}
    async function renderAudio(mode){const state=mediaState[mode],wrap=$(mode+'AudioWrap'),audio=$(mode+'AudioPreview'),removeBtn=$(mode+'RemoveAudioBtn'),status=$(mode+'RecordStatus');let url='',duration=0;if(state.audioBlob){url=state.audioUrl;duration=state.audioDuration}else if(mode==='edit'&&state.existingAudio&&!state.removeExistingAudio){url=await loadSignedUrl(state.existingAudio);duration=state.audioDuration}if(url){audio.src=url;wrap.hidden=false;removeBtn.hidden=false;if(!recorder||recordingTarget!==mode)status.textContent=`已保存录音 ${duration?formatDuration(duration):''}`.trim()}else{audio.removeAttribute('src');audio.load();wrap.hidden=true;removeBtn.hidden=true;if(!recorder||recordingTarget!==mode)status.textContent='尚未录音'}updateRecordingUi()}
    async function removeAudio(mode){if(recordingTarget===mode)await stopRecording(false);const state=mediaState[mode];if(state.audioUrl)URL.revokeObjectURL(state.audioUrl);state.audioBlob=null;state.audioUrl=null;state.audioDuration=0;if(mode==='edit'&&state.existingAudio)state.removeExistingAudio=true;renderAudio(mode)}

    async function loadSignedUrl(path){if(!path)return'';const cached=signedCache.get(path);if(cached&&cached.expires>Date.now())return cached.url;const{data,error}=await db.storage.from(MEDIA_BUCKET).createSignedUrl(path,3600);if(error){console.error(error);return''}const url=data?.signedUrl||'';if(url)signedCache.set(path,{url,expires:Date.now()+55*60*1000});return url}
    function makeStoragePath(group,kind,file){return `${session.user.id}/${group}/${kind}/${crypto.randomUUID()}.${fileExt(file.name,file.type)}`}
    async function uploadMediaFiles(files,group,kind,progressId){const paths=[];for(let i=0;i<files.length;i++){const file=files[i],path=makeStoragePath(group,kind,file);$(progressId).textContent=`正在上传${kind==='images'?'图片':'录音'} ${i+1}/${files.length}…`;const{error}=await db.storage.from(MEDIA_BUCKET).upload(path,file,{cacheControl:'3600',upsert:false,contentType:file.type||undefined});if(error){if(paths.length)await removeStorageFiles(paths);throw error}paths.push(path)}return paths}
    async function uploadAudioBlob(blob,group,progressId){if(!blob)return null;$(progressId).textContent='正在上传录音…';const contentType=baseMime(blob.type)||'audio/webm';const pseudo={name:`voice.${fileExt('',contentType)}`,type:contentType};const path=makeStoragePath(group,'audio',pseudo);const{error}=await db.storage.from(MEDIA_BUCKET).upload(path,blob,{cacheControl:'3600',upsert:false,contentType});if(error)throw error;return path}
    async function removeStorageFiles(paths){const valid=[...new Set((paths||[]).filter(Boolean))];if(!valid.length)return;const{error}=await db.storage.from(MEDIA_BUCKET).remove(valid);if(error)console.error('清理附件失败',error);valid.forEach(path=>signedCache.delete(path))}

    async function saveAdd(){if(recordingTarget==='add')await stopRecording(true);const title=normalizeText($('addTitle').value);if(!title){$('addTitle').focus();toast('请填写技能名称');return}const button=$('addSaveBtn');setButtonLoading(button,true,'保存中…');$('addUploadProgress').textContent='正在准备…';const uploaded=[];try{const group=crypto.randomUUID();const imagePaths=await uploadMediaFiles(mediaState.add.newImages,group,'images','addUploadProgress');uploaded.push(...imagePaths);const audioPath=await uploadAudioBlob(mediaState.add.audioBlob,group,'addUploadProgress');if(audioPath)uploaded.push(audioPath);$('addUploadProgress').textContent='正在保存技能…';const payload={title,category:$('addCategory').value||'其他',description:normalizeText($('addDescription').value),recorded_on:today(),image_paths:imagePaths,audio_path:audioPath,audio_duration:audioPath?mediaState.add.audioDuration:0};const{data,error}=await db.from('skills').insert(payload).select('id,title,category,description,recorded_on,created_at,updated_at,image_paths,audio_path,audio_duration').single();if(error)throw error;skills.unshift(data);await closeAdd();render();toast('文字和附件已保存到云端')}catch(error){console.error(error);await removeStorageFiles(uploaded);toast(error?.message?.includes('Bucket not found')?'请先运行附件升级 SQL':'保存失败，请重试')}finally{$('addUploadProgress').textContent='';setButtonLoading(button,false,'保存中…')}}

    async function openDetail(id){const skill=skills.find(item=>Number(item.id)===Number(id));if(!skill)return;currentId=Number(id);$('detailCategory').textContent=skill.category;$('detailTitle').textContent=skill.title;$('detailDescription').textContent=skill.description||'（暂无说明）';$('detailDate').textContent=`收录于 ${skill.recorded_on||''}`;$('detailView').hidden=false;$('editView').hidden=true;$('detailFoot').hidden=false;$('editFoot').hidden=true;$('detailMedia').innerHTML=(skill.image_paths?.length||skill.audio_path)?'<div class="media-hint">正在读取附件…</div>':'';openOverlay('detailOverlay');renderDetailMedia(skill)}
    async function renderDetailMedia(skill){const targetId=Number(skill.id),box=$('detailMedia');const sections=[];if(skill.image_paths?.length){const urls=await Promise.all(skill.image_paths.map(loadSignedUrl));if(currentId!==targetId)return;const images=urls.filter(Boolean).map((url,index)=>`<a href="${url}" target="_blank" rel="noopener"><img src="${url}" alt="技能图片 ${index+1}" loading="lazy"></a>`).join('');if(images)sections.push(`<div><div class="detail-section-title">图片 · ${skill.image_paths.length}</div><div class="detail-gallery">${images}</div></div>`)}if(skill.audio_path){const audioUrl=await loadSignedUrl(skill.audio_path);if(currentId!==targetId)return;if(audioUrl)sections.push(`<div class="detail-audio" style="margin-top:18px"><div class="detail-section-title">语音留言${skill.audio_duration?' · '+formatDuration(skill.audio_duration):''}</div><audio controls preload="metadata" src="${audioUrl}"></audio></div>`)}box.innerHTML=sections.join('')}
    function closeDetail(){if(recordingTarget==='edit')stopRecording(false);resetEditMedia();closeOverlay('detailOverlay');currentId=null}
    async function openEdit(){const skill=skills.find(item=>Number(item.id)===currentId);if(!skill)return;resetEditMedia();$('editTitle').value=skill.title;$('editDescription').value=skill.description||'';$('editUploadProgress').textContent='';fillCategorySelect('editCategory',skill.category);mediaState.edit.existingImages=[...(skill.image_paths||[])];mediaState.edit.existingAudio=skill.audio_path||null;mediaState.edit.audioDuration=skill.audio_duration||0;$('detailView').hidden=true;$('editView').hidden=false;$('detailFoot').hidden=true;$('editFoot').hidden=false;renderImageGrid('edit');await renderAudio('edit')}
    async function cancelEdit(){if(recordingTarget==='edit')await stopRecording(false);resetEditMedia();$('detailView').hidden=false;$('editView').hidden=true;$('detailFoot').hidden=false;$('editFoot').hidden=true}
    async function saveEdit(){if(recordingTarget==='edit')await stopRecording(true);const skill=skills.find(item=>Number(item.id)===currentId);if(!skill)return;const title=normalizeText($('editTitle').value);if(!title){$('editTitle').focus();toast('请填写技能名称');return}const button=$('editSaveBtn');setButtonLoading(button,true,'保存中…');$('editUploadProgress').textContent='正在准备…';const uploaded=[];try{const group=crypto.randomUUID();const newImagePaths=await uploadMediaFiles(mediaState.edit.newImages,group,'images','editUploadProgress');uploaded.push(...newImagePaths);const newAudioPath=await uploadAudioBlob(mediaState.edit.audioBlob,group,'editUploadProgress');if(newAudioPath)uploaded.push(newAudioPath);const finalImages=[...mediaState.edit.existingImages,...newImagePaths];let finalAudio=mediaState.edit.existingAudio,finalDuration=skill.audio_duration||0;if(mediaState.edit.removeExistingAudio){finalAudio=null;finalDuration=0}if(newAudioPath){finalAudio=newAudioPath;finalDuration=mediaState.edit.audioDuration}const payload={title,category:$('editCategory').value||'其他',description:normalizeText($('editDescription').value),image_paths:finalImages,audio_path:finalAudio,audio_duration:finalDuration,updated_at:new Date().toISOString()};$('editUploadProgress').textContent='正在保存修改…';const{data,error}=await db.from('skills').update(payload).eq('id',currentId).select('id,title,category,description,recorded_on,created_at,updated_at,image_paths,audio_path,audio_duration').single();if(error)throw error;const deleteAfter=[...mediaState.edit.removedImages];if(mediaState.edit.existingAudio&&(mediaState.edit.removeExistingAudio||newAudioPath))deleteAfter.push(mediaState.edit.existingAudio);await removeStorageFiles(deleteAfter);const index=skills.findIndex(item=>Number(item.id)===currentId);skills[index]=data;closeDetail();render();toast('修改和附件已同步')}catch(error){console.error(error);await removeStorageFiles(uploaded);toast('修改失败，请重试')}finally{$('editUploadProgress').textContent='';setButtonLoading(button,false,'保存中…')}}
    async function deleteSkill(){if(!currentId||!confirm('确定删除这条技能？文字、图片和录音都会永久删除。'))return;const id=currentId,skill=skills.find(item=>Number(item.id)===id);const{error}=await db.from('skills').delete().eq('id',id);if(error){console.error(error);toast('删除失败，请重试');return}await removeStorageFiles([...(skill?.image_paths||[]),skill?.audio_path]);skills=skills.filter(item=>Number(item.id)!==id);closeDetail();render();toast('技能和附件已删除')}

    function openCategories(){renderCategoryList();openOverlay('categoryOverlay');setTimeout(()=>$('newCategory').focus(),40)}
    function renderCategoryList(){$('categoryList').innerHTML=categories.map(name=>`<div class="category-row"><span>${escapeHtml(name)}</span><button title="删除分类" onclick="removeCategory('${escapeHtml(name).replace(/'/g,"\\'")}')">×</button></div>`).join('')}
    async function addCategory(){const name=normalizeText($('newCategory').value);if(!name){toast('请输入分类名称');return}if(name==='全部'||categories.includes(name)){toast('这个分类已经存在');return}const{error}=await db.from('skill_categories').insert({name,sort_order:categories.length});if(error){console.error(error);toast('添加分类失败');return}categories.push(name);$('newCategory').value='';renderCategoryList();buildTabs();toast('分类已添加')}
    async function ensureOtherCategory(){if(categories.includes('其他'))return;const{error}=await db.from('skill_categories').insert({name:'其他',sort_order:categories.length});if(error&&error.code!=='23505')throw error;categories.push('其他')}
    async function removeCategory(name){if(name==='其他'){toast('“其他”是保底分类，不能删除');return}const usedCount=skills.filter(item=>item.category===name).length;if(usedCount&&!confirm(`“${name}”中还有 ${usedCount} 条技能。删除分类后，这些技能会移到“其他”。继续吗？`))return;if(!usedCount&&!confirm(`确定删除分类“${name}”？`))return;try{if(usedCount){await ensureOtherCategory();const{error:updateError}=await db.from('skills').update({category:'其他',updated_at:new Date().toISOString()}).eq('category',name);if(updateError)throw updateError;skills=skills.map(item=>item.category===name?{...item,category:'其他'}:item)}const{error}=await db.from('skill_categories').delete().eq('name',name);if(error)throw error;categories=categories.filter(item=>item!==name);if(activeCategory===name)activeCategory='全部';renderCategoryList();buildTabs();render();toast('分类已删除')}catch(error){console.error(error);toast('删除分类失败')}}

    function readOldData(){try{const rawSkills=localStorage.getItem('sb_skills'),rawCategories=localStorage.getItem('sb_cats');const oldSkills=rawSkills?JSON.parse(rawSkills):[],oldCategories=rawCategories?JSON.parse(rawCategories):[];return{oldSkills:Array.isArray(oldSkills)?oldSkills:[],oldCategories:Array.isArray(oldCategories)?oldCategories:[]}}catch{return{oldSkills:[],oldCategories:[]}}}
    function detectLocalData(){const{oldSkills}=readOldData(),migrated=localStorage.getItem('sb_cloud_migrated_v1')==='1';if(oldSkills.length&&!migrated){$('migrationText').textContent=`共 ${oldSkills.length} 条。点击后会去重并上传，旧数据仍会保留在本机。`;$('migrationBanner').hidden=false}else $('migrationBanner').hidden=true}
    async function migrateLocalData(){const button=$('migrationBtn'),{oldSkills,oldCategories}=readOldData();if(!oldSkills.length){toast('没有检测到旧数据');$('migrationBanner').hidden=true;return}setButtonLoading(button,true,'迁移中…');try{const categoryNames=[...new Set([...oldCategories.filter(name=>name&&name!=='全部'),...oldSkills.map(item=>item.cat||item.category).filter(Boolean)])];for(const name of categoryNames){if(!categories.includes(name)){const{error}=await db.from('skill_categories').insert({name,sort_order:categories.length});if(error&&error.code!=='23505')throw error;categories.push(name)}}const existing=new Set(skills.map(item=>`${normalizeText(item.title)}|${normalizeText(item.category)}|${item.recorded_on||''}`));const payload=oldSkills.map(item=>({title:normalizeText(item.title)||'未命名技能',category:normalizeText(item.cat||item.category)||'其他',description:normalizeText(item.desc||item.description),recorded_on:item.date||item.recorded_on||today(),image_paths:[],audio_path:null,audio_duration:0})).filter(item=>!existing.has(`${item.title}|${item.category}|${item.recorded_on}`));if(payload.length){const{error}=await db.from('skills').insert(payload);if(error)throw error}localStorage.setItem('sb_cloud_migrated_v1','1');$('migrationBanner').hidden=true;await loadCloudData();toast(payload.length?`已迁移 ${payload.length} 条技能`:'旧数据已经在云端')}catch(error){console.error(error);toast('迁移失败，请稍后重试')}finally{setButtonLoading(button,false,'迁移中…')}}
    function exportBackup(){const data={exported_at:new Date().toISOString(),note:'图片与录音保存在 Supabase 私人存储中；此 JSON 保存附件路径。',skills,categories};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),link=document.createElement('a');link.href=url;link.download=`技能书备份-${today()}.json`;link.click();URL.revokeObjectURL(url);toast('备份文件已生成')}

    document.addEventListener('keydown',event=>{if(event.key!=='Escape')return;if($('addOverlay').classList.contains('open'))closeAdd();else if($('detailOverlay').classList.contains('open'))closeDetail();else closeOverlay('categoryOverlay')});
    init();
  </script>
